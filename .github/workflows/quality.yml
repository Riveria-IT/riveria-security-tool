name: Quality

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t sh_files < <(git ls-files '*.sh')
          mapfile -t bash_files < <(git grep -l '^#!/usr/bin/env bash' -- ':!*.sh')
          targets=("${sh_files[@]}" "${bash_files[@]}")
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No shell targets found."
            exit 0
          fi
          shellcheck -x "${targets[@]}"

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke test
        run: bash ./tests/smoke-test.sh
